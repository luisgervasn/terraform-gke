name: Deploy to GKE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v1
        with:
          cluster_name: final-project-cluster
          location: us-central1-a
          project_id: examen-td-494215

      - name: Deploy to GKE
        run: |
          kubectl apply -f app-td-config.yaml
          kubectl apply -f frontend-td-app-pvc.yaml
          kubectl apply -f frontend-td-app.yaml
          kubectl apply -f frontend-app-td-service.yaml
